services:
  - type: web
    name: afterglow-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: ALGORITHM_VERSION
        value: 1.0.0
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: Afterglow <onboarding@resend.dev>
      - key: DEVELOPER_EMAIL
        sync: false
